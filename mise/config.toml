[tools]
node = "lts"
bun = "latest"
gcloud = 'latest'
github-cli = 'latest'
opencode = "latest"
"npm:@antfu/ni" = "latest"
pnpm = 'latest'
"pipx:httpie" = "latest"
python = "3.14"
uv = "latest"
zellij = "latest"
"npm:pm2" = "latest"
lazygit = "latest"
yazi = "latest"
"npm:agent-browser" = "latest"
"npm:@vue/language-server" = "latest"
claude = "latest"
"npm:typescript-language-server" = "latest"
"npm:portless" = "latest"
"github:code-yeongyu/go-claude-code-comment-checker" = { version = "latest", exe = "comment-checker" }
"pipx:mycli" = "latest"
glab = { version = "latest", exe = "glab" }
"npm:oxlint" = "latest"
"npm:@biomejs/biome" = "latest"
"pipx:ruff" = "latest"
# rtk = "latest"  # 暫時停用 - plugin 移至 plugins-disabled/
bat = "latest"
"pipx:numpy" = "latest"
act = "latest"
codex = "latest"
worktrunk = "latest"

[settings]
npm.package_manager = "bun"
python.uv_venv_auto = true

# [task_config]
# dir = "tasks"

[tasks.commit]
run = "opencode run -m minimax-coding-plan/MiniMax-M2.7 '提交當前變更, 如果必要, 進行分組'"
