# =============================================================================
# kitty 設定檔
# 文件: https://sw.kovidgoyal.net/kitty/conf/
# 重新載入: ctrl+shift+f5  (或修改檔案後 kitty 自動偵測 — 如有設定)
# =============================================================================


# ---------- 字體 -------------------------------------------------------------
font_family      family="FiraCode Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size        11.0

# 啟用 ligatures（FiraCode 招牌功能），僅游標所在行停用以方便編輯
disable_ligatures cursor

# 行高與字距微調（讓 powerline tab 與 nerd icon 對齊更佳）
modify_font cell_height 110%
adjust_line_height  0
adjust_column_width 0

# CJK 對齊（中文搭配 Noto Sans Mono CJK TC）
symbol_map U+4E00-U+9FFF,U+3000-U+303F,U+FF00-U+FFEF Noto Sans Mono CJK TC


# ---------- 游標 -------------------------------------------------------------
cursor_shape               beam
cursor_beam_thickness      1.6
cursor_blink_interval      0
cursor_stop_blinking_after 15.0

# 游標拖尾動畫（0=關，3=明顯但不誇張；筆電省電可考慮關閉）
cursor_trail 3
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 2


# ---------- 卷軸 -------------------------------------------------------------
scrollback_lines                 10000
scrollback_pager_history_size    0
wheel_scroll_multiplier          5.0
touch_scroll_multiplier          1.0

# scrollback 用 less 開啟，支援搜尋與跳行（ctrl+shift+h）
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# 貼上保護：URL 自動加引號、大量文字確認、移除危險控制字元
paste_actions quote-urls-at-prompt,confirm-if-large,replace-dangerous-control-codes


# ---------- 滑鼠 -------------------------------------------------------------
mouse_hide_wait        3.0
copy_on_select         yes
strip_trailing_spaces  smart
url_style              curly
detect_urls            yes
show_hyperlink_targets yes
underline_hyperlinks   hover
open_url_with          default


# ---------- 視窗 -------------------------------------------------------------
remember_window_size       yes
initial_window_width       1200
initial_window_height      720
window_padding_width       8 10
hide_window_decorations    no
confirm_os_window_close    -1
background_opacity         0.95
dynamic_background_opacity yes
window_resize_step_cells   2
window_resize_step_lines   2
inactive_text_alpha        0.85

# 視窗開啟時居中（多螢幕 / floating WM 友善）
placement_strategy center

# 標題列顏色跟主題一致（Fedora 43 預設 Wayland）
wayland_titlebar_color background


# ---------- Tab bar ---------------------------------------------------------
tab_bar_edge          bottom
tab_bar_style         powerline
tab_powerline_style   slanted
tab_bar_min_tabs      2
tab_activity_symbol   "● "
tab_title_template    "{index}: {title}"


# ---------- Bell -------------------------------------------------------------
enable_audio_bell    no
visual_bell_duration 0.0
window_alert_on_bell yes
bell_on_tab          "🔔 "

# 長命令完成桌面通知（focus 不在當前 window + 命令 >10s）
notify_on_cmd_finish unfocused 10.0


# ---------- 效能 -------------------------------------------------------------
repaint_delay   8
input_delay     1
sync_to_monitor yes


# ---------- Shell / 終端 -----------------------------------------------------
shell_integration enabled
allow_remote_control yes
listen_on            unix:/tmp/kitty-{kitty_pid}
update_check_interval 0
clipboard_control     write-clipboard write-primary read-clipboard read-primary
term                  xterm-kitty
editor                .


# ---------- Layouts ----------------------------------------------------------
enabled_layouts splits:split_axis=horizontal,stack

# 雙擊選字時把這些字元當作 word 的一部分
select_by_word_characters @-./_~?&=%+#:


# ---------- 鍵位映射 ---------------------------------------------------------
# 預設已有：ctrl+shift+c/v 複製貼上、ctrl+shift+t 新分頁、ctrl+shift+enter 新視窗
# 詳見：https://sw.kovidgoyal.net/kitty/actions/

# 視窗 / Tab — 全部以當前工作目錄開啟
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+t     new_tab_with_cwd

# Splits（類 tmux）
map ctrl+shift+\ launch --location=vsplit --cwd=current
map ctrl+shift+- launch --location=hsplit --cwd=current

# 切換 split / window 焦點
map ctrl+shift+h neighboring_window left
map ctrl+shift+l neighboring_window right
map ctrl+shift+k neighboring_window up
map ctrl+shift+j neighboring_window down

# Layout 循環
map ctrl+shift+space next_layout

# 字體大小
map ctrl+shift+equal     change_font_size all +1.0
map ctrl+shift+plus      change_font_size all +1.0
map ctrl+shift+minus     change_font_size all -1.0
map ctrl+shift+0         change_font_size all 0

# 透明度即時調整
map ctrl+shift+a>m set_background_opacity +0.05
map ctrl+shift+a>l set_background_opacity -0.05
map ctrl+shift+a>1 set_background_opacity 1
map ctrl+shift+a>d set_background_opacity default

# 設定檔操作
map ctrl+shift+f5 load_config_file
map ctrl+shift+f2 edit_config_file


# ---------- 主題 -------------------------------------------------------------
include themes/catppuccin-mocha.conf
